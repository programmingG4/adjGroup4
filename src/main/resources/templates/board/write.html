<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CampusOn | 글쓰기</title>
    <link rel="stylesheet" href="/css/main.css">
    <link rel="stylesheet" href="/css/subtab-theme.css">
    <style>
        /* 익명 토글 버튼 */
        .anon-toggle-btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 8px 16px;
            border: 1.5px solid #eadbc9;
            border-radius: 20px;
            background: #fffaf4;
            color: #9f8773;
            font-size: 14px;
            cursor: pointer;
            transition: 0.2s;
            user-select: none;
        }

        .anon-toggle-btn.active {
            background: linear-gradient(180deg, #d99a70, #cb8458);
            color: white;
            border-color: #cb8458;
        }

        .anon-toggle-btn input[type="checkbox"] {
            display: none;
        }

        /* 하단 옵션 버튼들 */
        .board-options-bar {
            display: flex;
            gap: 10px;
            margin-bottom: 16px;
            flex-wrap: wrap;
        }

        .board-option-btn {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 8px 16px;
            border: 1.5px solid #eadbc9;
            border-radius: 20px;
            background: #fffaf4;
            color: #9f8773;
            font-size: 14px;
            cursor: pointer;
            transition: 0.2s;
        }

        .board-option-btn.active {
            background: linear-gradient(180deg, #d99a70, #cb8458);
            color: white;
            border-color: #cb8458;
        }

        .author-group {
            display: flex;
            align-items: center;
            gap: 8px;
            white-space: nowrap;
        }

        .board-drop-zone {
            border: 2px dashed #eadbc9;
            border-radius: 12px;
            padding: 32px 20px;
            text-align: center;
            color: #9f8773;
            cursor: pointer;
            transition: border-color 0.2s, background 0.2s;
            background: #fffaf4;
            font-size: 14px;
            user-select: none;
        }

        .board-drop-zone.drag-over {
            border-color: #cb8458;
            background: #f6eadb;
            color: #b26f49;
        }
    </style>
</head>

<body>
    <div class="subtab-shell">
        <div class="subtab-wrap">
            <header th:replace="~{fragments/app-layout :: subtabHeader}"></header>

            <div class="subtab-layout">
                <aside th:replace="~{fragments/app-layout :: subtabSidebar('board', '')}"></aside>

                <section class="subtab-content board-theme-list">
                    <section class="subtab-section">
                        <div style="display:flex; align-items:center; gap:14px; margin-bottom:4px;">
                            <a onclick="history.back(); return false;" href="#"
                               style="display:inline-flex; align-items:center; justify-content:center;
                                      width:36px; height:36px; border-radius:12px; flex-shrink:0;
                                      background:rgba(242,231,217,0.92); color:#8f6d4c;
                                      font-size:18px; text-decoration:none;">←</a>
                            <div>
                                <p class="board-eyebrow">WRITE POST</p>
                                <h1 class="subpage-title">새 게시글 작성</h1>
                            </div>
                        </div>
                    </section>

                    <section class="subtab-section">
                        <section class="board-write-card">
                            <form th:action="@{/board/save}" method="post" enctype="multipart/form-data"
                                class="board-write-form">

                                <!-- 카테고리 + 익명 토글 -->
                                <div class="board-form-group">
                                    <label class="board-label">카테고리</label>
                                    <div style="display:flex; align-items:center; gap:10px;">
                                        <select name="category" id="category-select" class="board-select" required style="flex:1;">
                                            <option value="익명 게시판">🎭 익명 게시판</option>
                                            <option value="중고거래 게시판">🤝 중고거래 게시판</option>
                                            <option value="📢 모집중">📢 모집중</option>
                                        </select>
                                        <div class="author-group">
                                            <span class="board-label" style="margin:0;">작성자</span>
                                            <!-- 익명 토글 버튼 -->
                                            <label class="anon-toggle-btn" id="anon-toggle-label">
                                                <input type="checkbox" id="anon-check"
                                                    onchange="toggleAuthor(this.checked)">
                                                <span id="anon-toggle-text">익명</span>
                                            </label>
                                        </div>
                                    </div>
                                </div>

                                <!-- 기명일 때 작성자 표시 -->
                                <div class="board-form-group" id="author-display" style="display:block;">
                                    <input type="text" name="author" id="author-input-field" class="board-input" th:value="${loginMemberName}"
                                        th:attr="data-name=${loginMemberName}" readonly style="background:#f0f0f0; cursor:not-allowed;">
                                </div>

                                <!-- 제목 -->
                                <div class="board-form-group">
                                    <label class="board-label">제목</label>
                                    <input type="text" name="title" class="board-input" placeholder="제목을 입력하세요"
                                        required>
                                </div>

                                <!-- 본문 -->
                                <div class="board-form-group">
                                    <label class="board-label">본문</label>
                                    <textarea name="content" rows="8" class="board-textarea"
                                        placeholder="학우들과 나누고 싶은 내용을 적어주세요" required></textarea>
                                </div>

                                <!-- 하단 옵션 버튼들 -->
                                <div class="board-options-bar">
                                    <button type="button" class="board-option-btn" id="photo-btn"
                                        onclick="togglePhotoSection()">
                                        📷 사진 첨부
                                    </button>
                                    <button type="button" class="board-option-btn" id="vote-btn"
                                        onclick="toggleVoteSection()">
                                        📊 투표 만들기
                                    </button>
                                </div>

                                <!-- 사진 첨부 섹션 -->
                                <div class="board-form-group" id="photo-section" style="display:none;">
                                    <div id="image-drop-zone" class="board-drop-zone"
                                         ondragover="onDragOver(event, 'image-drop-zone')"
                                         ondragleave="onDragLeave('image-drop-zone')"
                                         ondrop="onImageDrop(event)"
                                         onclick="document.getElementById('image-input').click()">
                                        📷 사진을 끌어다 놓거나 클릭해서 선택하세요
                                    </div>
                                    <input type="file" id="image-input" name="images" accept="image/*"
                                        onchange="onImageChange(this)" hidden multiple>
                                    <div id="image-preview" class="board-image-preview" style="display:none; margin-top:8px;"></div>
                                </div>

                                <!-- 투표 섹션 -->
                                <div class="board-form-group" id="vote-section" style="display:none;">
                                    <label class="board-label">투표 항목</label>
                                    <div id="vote-items" class="board-vote-editor">
                                        <div class="board-vote-edit-row">
                                            <input type="text" name="voteOption" class="board-input" placeholder="항목 1">
                                            <button type="button" class="board-mini-button"
                                                onclick="removeVote(this)">✕</button>
                                        </div>
                                        <div class="board-vote-edit-row">
                                            <input type="text" name="voteOption" class="board-input" placeholder="항목 2">
                                            <button type="button" class="board-mini-button"
                                                onclick="removeVote(this)">✕</button>
                                        </div>
                                    </div>
                                    <button type="button" class="board-add-button" onclick="addVoteItem()">+ 항목 추가</button>
                                    <div style="margin-top:10px;">
                                        <label class="board-label" style="font-size:13px;">투표 종료 시간 (선택)</label>
                                        <input type="datetime-local" name="voteDeadline" class="board-input"
                                               style="max-width:240px;">
                                    </div>
                                </div>

                                <button type="submit" id="submit-btn" class="btn-primary board-submit-button" style="margin-top:16px;"
                                    onclick="showLoading()">작성 완료</button>
                                <div id="loading-msg" style="display:none; text-align:center; margin-top:12px;
                                     color:#9f8773; font-size:14px;">
                                    ⏳ 업로드 중입니다. 잠시만 기다려주세요...
                                </div>
                            </form>
                        </section>
                    </section>
                </section>
            </div>
        </div>
    </div>

    <script>
        // 익명 토글
        function toggleAuthor(checked) {
            const authorDisplay = document.getElementById('author-display');
            const authorInput = document.getElementById('author-input-field');
            if (checked) {
                authorDisplay.style.display = 'none';
                authorInput.value = '';
                authorInput.removeAttribute('name'); // 폼 전송에서 제외
            } else {
                authorDisplay.style.display = 'block';
                authorInput.value = authorInput.getAttribute('data-name');
                authorInput.setAttribute('name', 'author'); // 다시 포함
            }
            document.getElementById('anon-toggle-label').classList.toggle('active', checked);
        }

        // 사진 섹션 토글
        function togglePhotoSection() {
            const section = document.getElementById('photo-section');
            const btn = document.getElementById('photo-btn');
            const isOpen = section.style.display !== 'none';
            section.style.display = isOpen ? 'none' : 'block';
            btn.classList.toggle('active', !isOpen);
        }

        // 투표 섹션 토글
        function toggleVoteSection() {
            const section = document.getElementById('vote-section');
            const btn = document.getElementById('vote-btn');
            const isOpen = section.style.display !== 'none';
            section.style.display = isOpen ? 'none' : 'block';
            btn.classList.toggle('active', !isOpen);
        }

        // 투표 항목 추가
        function addVoteItem() {
            const container = document.getElementById('vote-items');
            const count = container.children.length + 1;
            const row = document.createElement('div');
            row.className = 'board-vote-edit-row';
            row.innerHTML = `<input type="text" name="voteOption" class="board-input" placeholder="항목 ${count}">
                         <button type="button" class="board-mini-button" onclick="removeVote(this)">✕</button>`;
            container.appendChild(row);
        }

        // 투표 항목 삭제
        function removeVote(btn) {
            const rows = document.querySelectorAll('.board-vote-edit-row');
            if (rows.length > 2) btn.parentElement.remove();
        }

        // 누적 이미지 파일 목록
        let _imageFiles = [];

        function onImageChange(input) {
            const newFiles = Array.from(input.files);
            newFiles.forEach(file => {
                const dup = _imageFiles.some(f => f.name === file.name && f.size === file.size);
                if (!dup) _imageFiles.push(file);
            });
            syncImageInput();
        }

        function syncImageInput() {
            const input = document.getElementById('image-input');
            const dt = new DataTransfer();
            _imageFiles.forEach(f => dt.items.add(f));
            input.files = dt.files;
            renderImagePreview();
        }

        function renderImagePreview() {
            const preview = document.getElementById('image-preview');
            preview.innerHTML = '';
            if (_imageFiles.length === 0) { preview.style.display = 'none'; return; }
            preview.style.display = 'grid';
            preview.style.gridTemplateColumns = 'repeat(auto-fill, minmax(100px,1fr))';
            preview.style.gap = '8px';
            _imageFiles.forEach((file, idx) => {
                const reader = new FileReader();
                reader.onload = e => {
                    const wrap = document.createElement('div');
                    wrap.style.cssText = 'position:relative;';
                    const img = document.createElement('img');
                    img.src = e.target.result;
                    img.style.cssText = 'width:100%; aspect-ratio:1; object-fit:cover; border-radius:8px; border:1px solid #eadbc9;';
                    const del = document.createElement('button');
                    del.type = 'button';
                    del.textContent = '✕';
                    del.style.cssText = 'position:absolute; top:3px; right:3px; background:rgba(0,0,0,0.5); color:#fff; border:none; border-radius:50%; width:20px; height:20px; font-size:11px; cursor:pointer; line-height:1;';
                    del.addEventListener('click', function() {
                        _imageFiles.splice(idx, 1);
                        syncImageInput();
                    });
                    wrap.appendChild(img);
                    wrap.appendChild(del);
                    preview.appendChild(wrap);
                };
                reader.readAsDataURL(file);
            });
        }

        // 드래그앤드롭
        function onDragOver(event, zoneId) {
            event.preventDefault();
            document.getElementById(zoneId).classList.add('drag-over');
        }

        function onDragLeave(zoneId) {
            document.getElementById(zoneId).classList.remove('drag-over');
        }

        function onImageDrop(event) {
            event.preventDefault();
            document.getElementById('image-drop-zone').classList.remove('drag-over');
            const files = Array.from(event.dataTransfer.files).filter(f => f.type.startsWith('image/'));
            files.forEach(file => {
                const dup = _imageFiles.some(f => f.name === file.name && f.size === file.size);
                if (!dup) _imageFiles.push(file);
            });
            syncImageInput();
        }

        function showLoading() {
            setTimeout(() => {
                document.getElementById('submit-btn').disabled = true;
                document.getElementById('submit-btn').textContent = '업로드 중...';
                document.getElementById('loading-msg').style.display = 'block';
            }, 100);
        }
    </script>
</body>

</html>
