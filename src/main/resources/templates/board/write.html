<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CampusOn | 글쓰기</title>
    <link rel="stylesheet" href="/css/main.css">
    <link rel="stylesheet" href="/css/subtab-theme.css">
</head>
<body>
<div class="subtab-shell">
    <div class="subtab-wrap">
        <header th:replace="~{fragments/app-layout :: subtabHeader}"></header>

        <div class="subtab-layout">
            <aside th:replace="~{fragments/app-layout :: subtabSidebar('board')}"></aside>

            <section class="subtab-content board-theme-list">
                <section class="subtab-section">
                    <section class="board-page-head board-write-head">
                        <div>
                            <p class="board-eyebrow">WRITE POST</p>
                            <h1 class="subpage-title">새 게시글 작성</h1>
                            <p class="subpage-desc">간결한 PC 레이아웃으로 작성하고, 이후 모바일 대응도 쉽게 이어갈 수 있도록 정리했습니다.</p>
                        </div>
                        <a href="/board" class="btn-secondary board-write-back">목록으로</a>
                    </section>
                </section>

                <section class="subtab-section">
                    <section class="board-write-card">
                        <form th:action="@{/board/save}" method="post" enctype="multipart/form-data" class="board-write-form">
                            <div class="board-form-grid">
                                <div class="board-form-group">
                                    <label class="board-label">카테고리</label>
                                    <select name="category" id="category-select" class="board-select" onchange="toggleVote(this.value)" required>
                                        <option value="공지">📢 공지</option>
                                        <option value="투표">📊 투표</option>
                                        <option value="스터디 모집">📖 스터디 모집</option>
                                        <option value="중고거래">🤝 중고거래</option>
                                    </select>
                                </div>

                                <div class="board-form-group">
                                    <label class="board-label">작성자 설정</label>
                                    <div class="board-author-toggle">
                                        <input type="radio" name="authorType" id="anon" value="anon" checked onchange="toggleAuthor(this.value)">
                                        <label for="anon">🙈 익명으로 작성</label>
                                        <input type="radio" name="authorType" id="named" value="named" onchange="toggleAuthor(this.value)">
                                        <label for="named">👤 이름 직접 입력</label>
                                    </div>
                                </div>
                            </div>

                            <div class="board-form-group" id="author-input" style="display:none;">
                                <label class="board-label">작성자 이름</label>
                                <input type="text" name="author" class="board-input" placeholder="이름을 입력하세요">
                            </div>

                            <div class="board-form-group">
                                <label class="board-label">제목</label>
                                <input type="text" name="title" class="board-input" placeholder="제목을 입력하세요" required>
                            </div>

                            <div class="board-form-group">
                                <label class="board-label">본문</label>
                                <textarea name="content" rows="8" class="board-textarea" placeholder="학우들과 나누고 싶은 내용을 적어주세요" required></textarea>
                            </div>

                            <div class="board-form-group" id="vote-section" style="display:none;">
                                <label class="board-label">📊 투표 항목</label>
                                <div id="vote-items" class="board-vote-editor">
                                    <div class="board-vote-edit-row">
                                        <input type="text" name="voteOption" class="board-input" placeholder="항목 1">
                                        <button type="button" class="board-mini-button" onclick="removeVote(this)">✕</button>
                                    </div>
                                    <div class="board-vote-edit-row">
                                        <input type="text" name="voteOption" class="board-input" placeholder="항목 2">
                                        <button type="button" class="board-mini-button" onclick="removeVote(this)">✕</button>
                                    </div>
                                </div>
                                <button type="button" class="board-add-button" onclick="addVoteItem()">+ 항목 추가</button>
                            </div>

                            <div class="board-form-group">
                                <label class="board-label">사진 첨부</label>
                                <label class="board-upload-box" for="image-input">📷 사진을 선택하세요</label>
                                <input type="file" id="image-input" name="image" accept="image/*" onchange="previewImage(this)" hidden>
                                <div id="image-preview" class="board-image-preview" style="display:none;">
                                    <img id="preview-img" src="" alt="미리보기">
                                </div>
                            </div>

                            <button type="submit" class="btn-primary board-submit-button">작성 완료</button>
                        </form>
                    </section>
                </section>
            </section>
        </div>
    </div>
</div>

<script>
    function toggleVote(val) {
        document.getElementById('vote-section').style.display = val === '투표' ? 'block' : 'none';
    }
    function toggleAuthor(val) {
        document.getElementById('author-input').style.display = val === 'named' ? 'block' : 'none';
    }
    function addVoteItem() {
        const container = document.getElementById('vote-items');
        const count = container.children.length + 1;
        const row = document.createElement('div');
        row.className = 'board-vote-edit-row';
        row.innerHTML = `<input type="text" name="voteOption" class="board-input" placeholder="항목 ${count}">
                         <button type="button" class="board-mini-button" onclick="removeVote(this)">✕</button>`;
        container.appendChild(row);
    }
    function removeVote(btn) {
        const rows = document.querySelectorAll('.board-vote-edit-row');
        if (rows.length > 2) btn.parentElement.remove();
    }
    function previewImage(input) {
        if (input.files && input.files[0]) {
            const reader = new FileReader();
            reader.onload = e => {
                document.getElementById('preview-img').src = e.target.result;
                document.getElementById('image-preview').style.display = 'block';
            };
            reader.readAsDataURL(input.files[0]);
        }
    }
</script>
</body>
</html>
