<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CampusOn | 게시글 상세</title>
    <link rel="stylesheet" href="/css/main.css">
    <link rel="stylesheet" href="/css/subtab-theme.css">
</head>
<body>
<div class="subtab-shell">
    <div class="subtab-wrap">
        <header class="subtab-header">
            <h1 class="subtab-logo">CAMPUSON</h1>
            <p class="subtab-tagline">학생을 위한 소통과 정보의 시작점</p>
            <div class="subtab-divider"></div>
        </header>

        <div class="subtab-layout">
            <aside class="subtab-sidebar">
                <section class="subtab-panel">
                    <p class="subtab-panel-eyebrow">BOARD DETAIL</p>
                    <h2 class="subtab-profile-name">게시글 상세 보기</h2>
                    <p class="subtab-profile-meta">본문, 투표, 댓글을 한 화면에서 확인할 수 있도록 게시판 흐름과 같은 테마로 맞췄습니다.</p>
                    <a href="/board" class="subtab-profile-link">게시판으로 돌아가기</a>
                </section>

                <nav class="subtab-shortcuts" aria-label="바로가기 메뉴">
                    <a href="/home" class="subtab-shortcut">
                        <span class="subtab-shortcut-icon">⌂</span>
                        <span><strong class="subtab-shortcut-title">메인</strong><span class="subtab-shortcut-desc">캠퍼스온 홈으로 이동</span></span>
                    </a>
                    <a href="/chat" class="subtab-shortcut">
                        <span class="subtab-shortcut-icon">💬</span>
                        <span><strong class="subtab-shortcut-title">채팅</strong><span class="subtab-shortcut-desc">팀 소통과 알림 확인</span></span>
                    </a>
                    <a href="/board" class="subtab-shortcut active">
                        <span class="subtab-shortcut-icon">📌</span>
                        <span><strong class="subtab-shortcut-title">게시판</strong><span class="subtab-shortcut-desc">공지와 자유 게시글 보기</span></span>
                    </a>
                    <a href="/mypage" class="subtab-shortcut">
                        <span class="subtab-shortcut-icon">👤</span>
                        <span><strong class="subtab-shortcut-title">MY</strong><span class="subtab-shortcut-desc">내 정보와 활동 관리</span></span>
                    </a>
                </nav>
            </aside>

            <section class="subtab-content board-theme-list">
                <section class="subtab-section">
                    <a href="/board" class="board-back-link">← 게시판으로 돌아가기</a>

                    <article class="board-detail-card">
                        <div class="board-detail-category" th:text="'[' + ${post.category} + ']'">[카테고리]</div>
                        <h1 class="board-detail-title" th:text="${post.title}">게시글 제목</h1>
                        <div class="board-detail-meta">
                            <span th:text="${post.author}">작성자</span>
                            <span class="board-meta-divider">•</span>
                            <span th:text="${#temporals.format(post.regDate, 'yyyy-MM-dd HH:mm')}">등록일</span>
                        </div>
                        <div class="board-detail-content" th:text="${post.content}"></div>
                        <div th:if="${not #lists.isEmpty(post.imagePaths)}" class="board-detail-images">
                            <img th:each="img : ${post.imagePaths}"
                                th:src="${img}"
                                class="board-detail-image" alt="첨부 이미지">
                        </div>
                        <div th:if="${loginMemberId != null and loginMemberId == post.memberId}"
                            style="display:flex; justify-content:flex-end; gap:8px; margin-top:15px;">
                            <a th:href="@{/board/{id}/edit(id=${post.id})}" style="width:80px; text-align:center; background:#90caf9; color:white;
                                      padding:8px 0; border-radius:8px; text-decoration:none; font-size:13px;">
                                ✏️ 수정
                            </a>
                            <form th:action="@{/board/{id}/delete(id=${post.id})}" method="post" onsubmit="return confirm('정말 삭제하시겠습니까?')">
                                <button type="submit" style="width:80px; background:#e57373; color:white;
                                               padding:8px 0; border-radius:8px; border:none;
                                               cursor:pointer; font-size:13px;">
                                    🗑 삭제
                                </button>
                            </form>
                        </div>
                        <section class="board-vote-section" th:if="${not #lists.isEmpty(post.voteItems)}">
                            <h2 class="board-section-title">투표</h2>
                            <!-- 이미 투표했을 때 메시지 -->
                            <div th:if="${param.error == 'already_voted'}" style="background:#fff3cd; border:1px solid #ffc107; border-radius:10px;
                                        padding:12px; margin-bottom:15px; color:#856404; font-size:14px;">
                                ⚠️ 이미 투표하셨습니다.
                            </div>
                            <div th:each="item : ${post.voteItems}" class="board-vote-item">
                                <form th:action="@{/vote/{id}(id=${item.id})}" method="post">
                                    <input type="hidden" name="boardId" th:value="${post.id}">
                                    <button type="submit" class="board-vote-button" th:disabled="${alreadyVoted}">
                                        <div class="board-vote-track">
                                            <div class="board-vote-fill"
                                                 th:style="'width:' + ${totalVotes > 0 ? (item.voteCount * 100 / totalVotes) : 0} + '%'">
                                            </div>
                                            <span class="board-vote-label" th:text="${item.itemText}">항목</span>
                                            <span class="board-vote-count" th:text="${item.voteCount} + '표'">0표</span>
                                        </div>
                                    </button>
                                </form>
                            </div>
                        </section>
                    </article>
                </section>

                <section class="subtab-section">
                    <article class="board-detail-card">
                        <div class="board-comment-head">
                            <h2 class="board-section-title">댓글</h2>
                            <span class="board-comment-count" th:text="${#lists.size(post.comments)} + '개'">0개</span>
                        </div>

                        <div th:each="c : ${post.comments}" class="board-comment-item">
                            <div style="display:flex; justify-content:space-between; align-items:center;">
                                <div class="board-comment-author" th:text="${c.author}"></div>
                                <form th:if="${loginMemberId != null and loginMemberId == c.memberId}"
                                    th:action="@{/comment/{id}/delete(id=${c.id})}" method="post" onsubmit="return confirm('댓글을 삭제하시겠습니까?')">
                                    <input type="hidden" name="boardId" th:value="${post.id}">
                                    <button type="submit" class="board-mini-button" style="font-size:11px; padding:3px 8px;">삭제</button>
                                </form>
                            </div>
                            <div class="board-comment-content" th:text="${c.content}"></div>
                            <div class="board-comment-date" th:text="${#temporals.format(c.regDate, 'MM/dd HH:mm')}"></div>
                        </div>

                        <form th:action="@{/board/{id}/comment(id=${post.id})}" method="post" class="board-comment-form">
                            <div style="display:flex; align-items:center; gap:10px; margin-bottom:10px;">
                                <label class="anon-toggle-btn" id="comment-anon-label" style="
                                    display:inline-flex; align-items:center; gap:6px;
                                    padding:8px 16px; border:1.5px solid #eadbc9; border-radius:20px;
                                    background:#fffaf4; color:#9f8773; font-size:14px; cursor:pointer; transition:0.2s;">
                                    <input type="checkbox" id="comment-anon-check" onchange="toggleCommentAuthor(this.checked)"
                                        style="display:none;">
                                    익명
                                </label>
                                <input type="text" name="author" id="comment-author-input" th:value="${loginMemberName}"
                                    th:data-name="${loginMemberName}" class="board-input" readonly
                                    style="flex:1; background:#f0f0f0; cursor:not-allowed;">
                            </div>
                            <textarea name="content" rows="4" class="board-textarea" placeholder="댓글을 입력하세요" required></textarea>
                            <button type="submit" class="btn-primary board-submit-button">댓글 등록</button>
                        </form>
                    </article>
                </section>
            </section>
        </div>
    </div>
</div>

<script th:inline="javascript">
    const loginMemberName = /*[[${loginMemberName}]]*/ '익명';

    function toggleCommentAuthor(checked) {
        const input = document.getElementById('comment-author-input');
        const label = document.getElementById('comment-anon-label');
        if (checked) {
            input.value = '익명';
        } else {
            input.value = input.dataset.name;
        }
        label.style.background = checked ? 'linear-gradient(180deg, #d99a70, #cb8458)' : '#fffaf4';
        label.style.color = checked ? 'white' : '#9f8773';
        label.style.borderColor = checked ? '#cb8458' : '#eadbc9';
    }
</script>
</body>
</html>
