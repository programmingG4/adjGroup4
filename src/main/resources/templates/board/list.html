<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>2026-1 단국대 컴퓨터공학과 게시판</title>
    <style>
        /* 1. 웹 전용 디자인 설정 */
        body {
            font-family: 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif;
            background-color: #f4f6f9;
            /* 웹사이트 배경색 */
            margin: 0;
            padding: 40px 0;
            /* 상하 여백 */
        }

        /* 2. 게시판 중앙 컨테이너 (웹 크기) */
        .board-container {
            max-width: 900px;
            /* 웹사이트에 맞는 넓은 너비 */
            margin: 0 auto;
            /* 중앙 정렬 */
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.08);
            /* 조금 더 고급스러운 그림자 */
            overflow: hidden;
            /* 테두리 둥글게 유지 */
        }

        /* [추가] 3. 상단 채팅방 이름 영역 */
        .chatroom-header {
            padding: 20px 25px;
            background-color: white;
            border-bottom: 1px solid #f0f0f0;
            display: flex;
            align-items: center;
            background-color: white;
        }

        /* [추가] 3-1. 채팅방 로고 이미지 스타일 */
        .chatroom-logo {
            width: auto; /* 이미지 고유 비율 유지 */
            height: 40px; /* 헤더 높이에 맞게 조절 */
            margin-right: 15px; /* 글자와의 간격 */
            display: block; /* 여백 문제 방지 */
        }

        .chatroom-title {
            font-size: 18px;
            font-weight: 700;
            color: #333;
        }

        /* 4. 카테고리 탭 디자인 (웹 크기에 맞춤) */
        .nav-tabs {
            display: flex;
            list-style: none;
            padding: 0;
            margin: 0;
            border-bottom: 1px solid #eee;
            background: white;
        }

        .nav-tabs li {
            flex: 1;
            text-align: center;
        }

        .nav-tabs a {
            display: block;
            padding: 18px 0;
            text-decoration: none;
            color: #666;
            font-size: 15px;
        }

        /* 활성화된 탭 밑줄 */
        .nav-tabs li.active {
            border-bottom: 3px solid #333;
        }

        .nav-tabs li.active a {
            color: #333;
            font-weight: bold;
        }

        /* 5. 콘텐츠 영역 */
        .content {
            padding: 30px;
        }

        /* 제목 스타일 */
        .content h3 {
            font-size: 20px;
            font-weight: 700;
            color: #1a1a1a;
            margin-top: 0;
            margin-bottom: 25px;
            border-left: 5px solid #5c7cfa;
            padding-left: 10px;
        }

        /* 게시글 임시 아이템 스타일 */
        .post-item {
            padding: 20px;
            border: 1px solid #f0f0f0;
            border-radius: 8px;
            background-color: #fafafa;
        }
    </style>
</head>

<body>

    <div class="board-container">

        <div class="chatroom-header">
            <img th:src="@{/images/dku_cse_logo.jpg}" alt="단국대 컴공 로고" class="chatroom-logo">
            <div class="chatroom-title" th:text="${chatRoomName}">채팅방 이름</div>
        </div>

        <ul class="nav-tabs">
            <li th:each="cat : ${categories}" th:classappend="${cat == selectedCategory} ? 'active'">
                <a th:href="@{/board(category=${cat})}" th:text="${cat}">카테고리</a>
            </li>
        </ul>

        <div class="content">
            <h3 th:text="${selectedCategory} + ' 게시판'"></h3>
            <div class="post-item">
                <strong>[공지] 시스템 점검 안내</strong><br>
                <span th:text="${selectedCategory} + ' 카테고리의 실제 게시글 목록은 다음 단계에서 구현합니다.'"></span>
            </div>
        </div>
    </div>

</body>

</html>
