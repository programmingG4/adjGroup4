<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CampusOn | 게시판</title>
    <link rel="stylesheet" href="/css/main.css">
    <link rel="stylesheet" href="/css/subtab-theme.css">
</head>
<body>
<div class="subtab-shell">
    <div class="subtab-wrap">
        <header th:replace="~{fragments/app-layout :: subtabHeader}"></header>

        <div class="subtab-layout">
            <aside th:replace="~{fragments/app-layout :: subtabSidebar('board')}"></aside>

            <section class="subtab-content board-theme-list">
                <section class="subtab-section">
                    <section class="board-page-head">
                        <div>
                            <p class="board-eyebrow">ANONYMOUS BOARD</p>
                            <h1 class="subpage-title">익명 게시판</h1>
                            <p class="subpage-desc">익명 게시글, 중고거래 게시글, 스터디 모집글을 한곳에서 확인할 수 있어요.</p>
                        </div>
                        <div class="board-room-chip">
                            <img th:src="@{/images/dku_cse_logo.jpg}" alt="단국대 컴공 로고" class="board-room-logo">
                            <span th:text="${chatRoomName}">채팅방 이름</span>
                        </div>
                    </section>

                    <section class="board-category-bar" style="display:flex; align-items:center; gap:8px; flex-wrap:wrap;">
                        <!-- 돋보기 버튼 -->
                        <button onclick="toggleSearch()" class="board-category-chip" style="display:flex; align-items:center; gap:4px;">
                            🔍
                        </button>
                    
                        <a th:each="cat : ${categories}" th:href="@{/board(category=${cat})}" class="board-category-chip"
                            th:classappend="${cat == selectedCategory} ? ' active'" th:text="${cat}">카테고리</a>
                    
                        <!-- 검색창 -->
                        <div id="search-bar" style="display:none; width:100%; margin-top:8px;">
                            <form th:action="@{/board/search}" method="get" style="display:flex; gap:8px;">
                                <input type="text" name="keyword" class="board-input" th:value="${keyword}" placeholder="제목 또는 내용 검색..."
                                    style="flex:1; padding:10px 14px; border-radius:20px;
                                              border:1px solid #eadbc9; background:#fffaf4;
                                              font-size:14px; outline:none;">
                                <button type="submit" class="board-category-chip active" style="padding:10px 16px;">검색</button>
                            </form>
                        </div>
                    </section>
                </section>

                <section class="subtab-section">
                    <section class="board-list-section">
                        <div th:if="${#lists.isEmpty(posts)}" class="board-empty-state">
                            아직 등록된 게시글이 없습니다.
                        </div>

                        <a th:href="@{/board/{id}(id=${post.id}, category=${selectedCategory})}" th:each="post : ${posts}"
                            class="board-post-card">
                            <div class="board-post-main">
                                <div class="board-post-head">
                                    <span class="board-post-category" th:text="'[' + ${post.category} + ']'">[카테고리]</span>
                                    <strong class="board-post-title" th:text="${post.title}">제목</strong>
                                </div>
                                <p class="board-post-content" th:text="${post.content}">내용</p>
                                <div class="board-post-meta">
                                    <span th:text="${post.author}">작성자</span>
                                    <span class="board-meta-divider">•</span>
                                    <span th:text="${#temporals.format(post.regDate, 'yyyy-MM-dd HH:mm')}">날짜</span>
                                </div>
                            </div>

                            <img th:if="${not #lists.isEmpty(post.imagePaths)}"
                                th:src="${post.imagePaths[0]}"
                                class="board-post-thumb"
                                alt="썸네일">
                        </a>
                  </section>
                </section>
            </section>
        </div>
    </div>
</div>

<script>
    function toggleSearch() {
        const bar = document.getElementById('search-bar');
        bar.style.display = bar.style.display === 'none' ? 'block' : 'none';
        if (bar.style.display === 'block') {
            bar.querySelector('input').focus();
        }
    }
</script>

</body>
</html>
