<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CampusOn | 게시판</title>
    <link rel="stylesheet" href="/css/main.css">
    <link rel="stylesheet" href="/css/subtab-theme.css">
    <style>
        /* 카테고리 + 검색 툴바 */
        .board-toolbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            margin-bottom: 12px;
            flex-wrap: wrap;
        }

        .board-category-group {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            align-items: center;
        }

        /* 검색창 (아이콘 내장) */
        .board-search-wrap {
            position: relative;
            display: inline-flex;
            align-items: center;
        }

        .board-search-input {
            padding: 7px 32px 7px 14px;
            border: 1.5px solid #eadbc9;
            border-radius: 20px;
            font-size: 13px;
            outline: none;
            background: #fffaf4;
            color: #555;
            width: 150px;
            transition: border-color 0.2s;
        }

        .board-search-input:focus {
            border-color: #cb8458;
        }

        .board-search-icon-btn {
            position: absolute;
            right: 8px;
            background: none;
            border: none;
            cursor: pointer;
            font-size: 14px;
            padding: 0;
            line-height: 1;
            color: #9f8773;
            display: flex;
            align-items: center;
        }
    </style>
</head>
<body>
<div class="subtab-shell">
    <div class="subtab-wrap">
        <header th:replace="~{fragments/app-layout :: subtabHeader}"></header>

        <div class="subtab-layout">
            <aside th:replace="~{fragments/app-layout :: subtabSidebar('board', 'write')}"></aside>

            <section class="subtab-content board-theme-list">
                <!-- 상단: 헤더 텍스트만 -->
                <section class="subtab-section">
                    <section class="board-page-head">
                        <div>
                            <p class="board-eyebrow">ANONYMOUS BOARD</p>
                            <h1 class="subpage-title">익명 게시판</h1>
                            <p class="subpage-desc">익명 게시글, 중고거래 게시글, 스터디 모집글을 한곳에서 확인할 수 있어요.</p>
                        </div>
                    </section>
                </section>

                <!-- 하단: 카테고리 + 검색 + 게시글 목록 -->
                <section class="subtab-section">
                    <section class="board-list-section">

                        <!-- 툴바: 카테고리(좌) + 검색(우) -->
                        <div class="board-toolbar">
                            <div class="board-category-group">
                                <a th:each="cat : ${categories}"
                                   th:href="@{/board(category=${cat})}"
                                   th:text="${cat}"
                                   th:classappend="${cat == selectedCategory} ? ' active'"
                                   class="board-category-chip">카테고리</a>
                            </div>
                            <form th:action="@{/board/search}" method="get">
                                <div class="board-search-wrap">
                                    <input type="text" name="keyword" class="board-search-input"
                                           th:value="${keyword}" placeholder="검색...">
                                    <button type="submit" class="board-search-icon-btn">🔍</button>
                                </div>
                            </form>
                        </div>

                        <div th:if="${#lists.isEmpty(posts)}" class="board-empty-state">
                            아직 등록된 게시글이 없습니다.
                        </div>

                        <a th:href="@{/board/{id}(id=${post.id}, category=${selectedCategory})}" th:each="post : ${posts}"
                            class="board-post-card">
                            <div class="board-post-main">
                                <div class="board-post-head">
                                    <span class="board-post-category" th:text="'[' + ${post.category} + ']'">[카테고리]</span>
                                    <strong class="board-post-title" th:text="${post.title}">제목</strong>
                                </div>
                                <p class="board-post-content" th:text="${post.content}">내용</p>
                                <div class="board-post-meta">
                                    <span th:text="${post.author}">작성자</span>
                                    <span class="board-meta-divider">•</span>
                                    <span th:text="${#temporals.format(post.regDate, 'yyyy-MM-dd HH:mm')}">날짜</span>
                                </div>
                            </div>

                            <img th:if="${not #lists.isEmpty(post.imagePaths)}"
                                th:src="${post.imagePaths[0]}"
                                class="board-post-thumb"
                                alt="썸네일">
                        </a>
                    </section>
                </section>
            </section>
        </div>
    </div>
</div>
</body>
</html>
