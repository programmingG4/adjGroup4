<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${displayRoomName} + ' - 채팅'">채팅방</title>
    <link rel="stylesheet" href="/css/main.css">
    <link rel="stylesheet" href="/css/subtab-theme.css">
    <style>
        .chat-room-wrap {
            display: flex;
            flex-direction: column;
            height: calc(100vh - 200px);
            min-height: 480px;
            background: rgba(255, 252, 247, 0.42);
            border-radius: 28px;
            overflow: visible;
        }

        .chat-room-header {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 18px 24px;
            border-bottom: 1px solid rgba(188, 153, 118, 0.22);
            background: rgba(255, 250, 243, 0.76);
            flex-shrink: 0;
            position: relative;
        }

        .chat-room-back {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 36px;
            height: 36px;
            border-radius: 12px;
            background: rgba(242, 231, 217, 0.92);
            color: #8f6d4c;
            font-size: 18px;
            text-decoration: none;
            flex-shrink: 0;
        }

        .chat-room-title {
            font-size: 20px;
            font-weight: 800;
            color: #6a503d;
            margin: 0;
        }

        .chat-room-type-badge {
            font-size: 12px;
            font-weight: 700;
            background: rgba(189, 123, 77, 0.12);
            color: #9a6340;
            border-radius: 999px;
            padding: 3px 10px;
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px 24px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .chat-messages::-webkit-scrollbar {
            width: 5px;
        }

        .chat-messages::-webkit-scrollbar-track {
            background: transparent;
        }

        .chat-messages::-webkit-scrollbar-thumb {
            background: rgba(188, 153, 118, 0.4);
            border-radius: 999px;
        }

        .msg-row {
            display: flex;
            gap: 10px;
            align-items: flex-end;
        }

        .msg-row.mine {
            flex-direction: row-reverse;
        }

        .msg-avatar {
            width: 34px;
            height: 34px;
            border-radius: 12px;
            background: rgba(242, 231, 217, 0.92);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            font-weight: 800;
            color: #8e6f53;
            flex-shrink: 0;
        }

        .msg-body {
            display: flex;
            flex-direction: column;
            gap: 4px;
            max-width: 65%;
        }

        .msg-row.mine .msg-body {
            align-items: flex-end;
        }

        .msg-sender {
            font-size: 12px;
            font-weight: 700;
            color: #9a7e64;
        }

        .msg-bubble {
            padding: 10px 14px;
            border-radius: 18px;
            font-size: 14px;
            line-height: 1.55;
            word-break: break-word;
            background: rgba(255, 250, 243, 0.9);
            color: #5d4633;
            border-bottom-left-radius: 4px;
        }

        .msg-row.mine .msg-bubble {
            background: var(--subtab-accent);
            color: #fff;
            border-bottom-left-radius: 18px;
            border-bottom-right-radius: 4px;
        }

        .msg-time {
            font-size: 11px;
            color: #b09078;
            padding: 0 2px;
        }

        .year-badge {
            display: inline-block;
            font-size: 11px;
            font-weight: 700;
            color: #bd7b4d;
            background: rgba(189, 123, 77, 0.12);
            border-radius: 6px;
            padding: 1px 6px;
            margin-left: 5px;
            vertical-align: middle;
        }

        .chat-input-area {
            padding: 16px 20px;
            border-top: 1px solid rgba(188, 153, 118, 0.22);
            background: rgba(255, 250, 243, 0.76);
            flex-shrink: 0;
        }

        .chat-input-form {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .chat-input {
            flex: 1;
            padding: 11px 16px;
            border-radius: 16px;
            border: 1px solid var(--border);
            background: var(--surface);
            color: var(--text);
            font-size: 14px;
            font-family: inherit;
            outline: none;
            transition: border-color 0.2s;
        }

        .chat-input:focus {
            border-color: var(--subtab-accent);
        }

        .chat-send-btn {
            padding: 11px 20px;
            border-radius: 16px;
            background: var(--subtab-accent);
            color: #fff;
            font-size: 14px;
            font-weight: 700;
            border: none;
            cursor: pointer;
            transition: opacity 0.18s;
            white-space: nowrap;
        }

        .chat-send-btn:hover {
            opacity: 0.88;
        }

        .chat-date-sep {
            text-align: center;
            font-size: 12px;
            color: #b09078;
            margin: 8px 0 4px;
            position: relative;
        }

        .chat-date-sep::before,
        .chat-date-sep::after {
            content: '';
            position: absolute;
            top: 50%;
            width: 38%;
            height: 1px;
            background: rgba(188, 153, 118, 0.25);
        }

        .chat-date-sep::before { left: 0; }
        .chat-date-sep::after { right: 0; }

        .chat-empty {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #b09078;
            font-size: 14px;
        }

        .read-badge {
            font-size: 10px;
            font-weight: 700;
            padding: 0 2px;
            align-self: flex-end;
            margin-bottom: 2px;
        }

        .read-badge.unread {
            color: #cb8458;
        }

        .read-badge.read {
            color: #b09078;
        }

        .chat-attach-btn {
            padding: 11px 14px;
            border-radius: 16px;
            background: rgba(189,123,77,0.1);
            color: var(--subtab-accent);
            font-size: 18px;
            border: none;
            cursor: pointer;
            transition: background 0.18s;
            white-space: nowrap;
        }
        .chat-attach-btn:hover { background: rgba(189,123,77,0.2); }

        .msg-image {
            max-width: 240px;
            max-height: 240px;
            border-radius: 10px;
            margin-top: 6px;
            display: block;
            cursor: pointer;
        }
        .msg-file-link {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            margin-top: 6px;
            padding: 8px 12px;
            background: rgba(189,123,77,0.1);
            border-radius: 10px;
            color: var(--subtab-accent);
            font-size: 13px;
            font-weight: 600;
            text-decoration: none;
            word-break: break-all;
        }
        .msg-file-link:hover { background: rgba(189,123,77,0.18); }

        .chat-menu-wrap {
            position: relative;
            margin-left: auto;
        }

        .chat-menu-btn {
            background: none;
            border: none;
            cursor: pointer;
            font-size: 18px;
            color: #8f6d4c;
            padding: 4px 8px;
            border-radius: 8px;
            line-height: 1;
        }

        .chat-menu-btn:hover {
            background: rgba(242, 231, 217, 0.92);
        }
/*
        .chat-menu-dropdown {
            display: none;
            position: absolute;
            right: 0;
            top: 36px;
            background: white;
            border: 1px solid #f0e4d7;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            min-width: 160px;
            z-index: 100;
            overflow: hidden;
        }
*/
        .chat-menu-dropdown {
            display: none;
            position: absolute;
            right: 0;
            top: 36px;
            background: white;
            border: 1px solid #f0e4d7;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            min-width: 160px;
            z-index: 1000;
            overflow: hidden;
        }

        .chat-menu-item {
            display: block;
            padding: 11px 16px;
            font-size: 14px;
            color: #5d4633;
            text-decoration: none;
            transition: background 0.2s;
            border-bottom: 1px solid #f8f0e6;
        }

        .chat-menu-item:last-child {
            border-bottom: none;
        }

        .chat-menu-item:hover {
            background: #f8f4f0;
        }

        .chat-menu-item.write {
            color: #b26f49;
            font-weight: bold;
        }
    </style>
</head>
<body>
<div class="subtab-shell">
    <div class="subtab-wrap">
        <header class="subtab-header">
            <h1 class="subtab-logo">CAMPUSON</h1>
            <p class="subtab-tagline">학생을 위한 소통과 정보의 시작점</p>
            <div class="subtab-divider"></div>
        </header>

        <div class="subtab-layout">
            <aside class="subtab-sidebar">
                <section class="subtab-panel">
                    <p class="subtab-panel-eyebrow">CHAT ROOM</p>
                    <h2 class="subtab-profile-name" th:text="${displayRoomName}">채팅방</h2>
                    <p class="subtab-profile-meta" th:text="${room.type.name() == 'GLOBAL' ? '전체 학생이 함께하는 채팅방입니다.' : (room.type.name() == 'GRADE' ? '학년별 채팅방입니다.' : '1:1 개인 채팅방입니다.')}"></p>
                    <a href="/chat" class="subtab-profile-link">← 채팅 목록으로</a>
                </section>

                <nav class="subtab-shortcuts" aria-label="바로가기 메뉴">
                    <a href="/home" class="subtab-shortcut">
                        <span class="subtab-shortcut-icon">⌂</span>
                        <span><strong class="subtab-shortcut-title">메인</strong><span class="subtab-shortcut-desc">캠퍼스온 홈으로 이동</span></span>
                    </a>
                    <a href="/chat" class="subtab-shortcut active">
                        <span class="subtab-shortcut-icon">💬</span>
                        <span><strong class="subtab-shortcut-title">채팅</strong><span class="subtab-shortcut-desc">팀 소통과 알림 확인</span></span>
                    </a>
                    <a href="/board" class="subtab-shortcut">
                        <span class="subtab-shortcut-icon">📌</span>
                        <span><strong class="subtab-shortcut-title">게시판</strong><span class="subtab-shortcut-desc">익명 소통과 거래 공간</span></span>
                    </a>
                    <a href="/mypage" class="subtab-shortcut">
                        <span class="subtab-shortcut-icon">👤</span>
                        <span><strong class="subtab-shortcut-title">MY</strong><span class="subtab-shortcut-desc">내 정보와 활동 관리</span></span>
                    </a>
                </nav>
            </aside>

            <section class="subtab-content">
                <div class="chat-room-wrap">
                    <div class="chat-room-header">
                        <a href="/chat" class="chat-room-back">←</a>
                        <h2 class="chat-room-title" th:text="${displayRoomName}">채팅방</h2>
                        <span class="chat-room-type-badge" th:text="${room.type.name() == 'GLOBAL' ? '전체' : 
                                       (room.type.name() == 'GRADE' ? '학년' : 
                                       (room.type.name() == 'GROUP' ? '모집중' : 
                                       (room.type.name() == 'TRADE' ? '중고거래' : '1:1')))}">전체</span>

                    
                        <!-- 세줄 버튼: 전체 채팅방일 때만 -->
                        <div class="chat-menu-wrap" th:if="${room.type.name() == 'GLOBAL' or room.type.name() == 'GRADE'}">
                            <button class="chat-menu-btn" onclick="toggleChatMenu(event)">☰</button>
                            <div id="chatMenuDropdown" class="chat-menu-dropdown">
                                <a th:href="@{/talkboard/write(from='chat', roomId=${room.id}, roomKey=${room.roomKey})}"
                                    class="chat-menu-item write">✏️ 공지글 작성하기</a>
                                <div style="height:1px; background:#f0e4d7;"></div>
                                <a th:href="@{/talkboard(category=공지, from='chat', roomId=${room.id}, roomKey=${room.roomKey})}"
                                    class="chat-menu-item">📢 공지</a>
                                <a th:href="@{/talkboard(category=투표, from='chat', roomId=${room.id}, roomKey=${room.roomKey})}"
                                    class="chat-menu-item">📊 투표</a>
                                <a th:href="@{/talkboard(category=사진, from='chat', roomId=${room.id}, roomKey=${room.roomKey})}"
                                    class="chat-menu-item">📷 사진</a>
                                <a th:href="@{/talkboard(category=동영상, from='chat', roomId=${room.id}, roomKey=${room.roomKey})}"
                                    class="chat-menu-item">🎬 동영상</a>
                                <a th:href="@{/talkboard(category=파일, from='chat', roomId=${room.id}, roomKey=${room.roomKey})}"
                                    class="chat-menu-item">📎 파일</a>
                            </div>
                        </div>
                    </div>

                    <!-- 공지 배너 -->
                    <div th:if="${pinnedNotice != null}"
                        style="background:rgba(203,132,88,0.08); border-bottom:1px solid rgba(203,132,88,0.2);">
                        <!-- 최신 공지 한 줄 -->
                        <div style="display:flex; align-items:center; gap:10px; padding:10px 20px;">
                            <span style="font-size:13px; flex-shrink:0;">📌</span>
                            <a th:href="@{/talkboard/{id}(id=${pinnedTalkBoardId}, from='chat', roomId=${room.id})}" style="flex:1; text-decoration:none; color:#6a503d;
                                      font-size:13px; font-weight:600; white-space:nowrap;
                                      overflow:hidden; text-overflow:ellipsis;" th:text="${pinnedNoticeTitle}">
                            </a>
                            <button th:if="${pinnedNoticeTitles != null and #lists.size(pinnedNoticeTitles) > 1}" onclick="togglePinnedList()" id="pinnedToggleBtn" style="background:none; border:none; cursor:pointer;
                                           font-size:13px; color:#9f8773; padding:2px 6px;
                                           flex-shrink:0;">▾</button>
                        </div>
                    
                        <!-- 펼쳐지는 목록 -->
                        <div id="pinnedList" style="display:none;"
                            th:if="${pinnedNoticeTitles != null and not #lists.isEmpty(pinnedNoticeTitles) and #lists.size(pinnedNoticeTitles) > 1}">
                            <div th:each="i : ${#numbers.sequence(0, #lists.size(pinnedNoticeTitles) - 2)}"
                                style="border-top:1px solid rgba(203,132,88,0.15);">
                                <a th:href="@{/talkboard/{id}(id=${pinnedTalkBoardIds[i]}, from='chat', roomId=${room.id})}" style="display:flex; align-items:center; gap:10px;
                                          padding:8px 20px; text-decoration:none;
                                          color:#6a503d; font-size:13px; font-weight:600;">
                                    <span style="font-size:13px; flex-shrink:0;">📌</span>
                                    <span th:text="${pinnedNoticeTitles[i]}"
                                        style="white-space:nowrap; overflow:hidden; text-overflow:ellipsis;"></span>
                                </a>
                            </div>
                        </div>
                    </div>

                    <div class="chat-messages" id="chatMessages">
                        <div th:if="${#lists.isEmpty(messages)}" class="chat-empty">
                            아직 메시지가 없어요. 첫 번째로 인사해보세요!
                        </div>
                        <th:block th:each="msg, stat : ${messages}">
                            <div class="chat-date-sep"
                                th:if="${stat.first or !#temporals.format(messages[stat.index - 1].sentAt, 'yyyy-MM-dd').equals(#temporals.format(msg.sentAt, 'yyyy-MM-dd'))}">
                                <span th:text="${#temporals.format(msg.sentAt, 'yyyy년 M월 d일')}"></span>
                            </div>
                        
                            <!-- 시스템 메시지 -->
                            <div th:if="${msg.sender == 'SYSTEM'}" style="display:flex; gap:10px; align-items:flex-start; margin:4px 0;">
                                <div class="msg-avatar" style="background:rgba(203,132,88,0.15); color:#cb8458;
                                            font-size:13px; font-weight:800; flex-shrink:0;">공</div>
                                <div style="max-width:280px;">
                                    <span class="msg-sender" style="display:block; margin-bottom:4px;">공지</span>
                                    <div style="background:rgba(255,250,243,0.9); border:1px solid rgba(203,132,88,0.25);
                                                border-radius:18px; border-bottom-left-radius:4px;
                                                overflow:hidden; box-shadow:0 2px 8px rgba(93,70,51,0.08);">
                                        <!-- 제목 영역 -->
                                        <div style="padding:12px 16px; font-size:13px; color:#5d4633; line-height:1.6; white-space:pre-line;"
                                            th:text="${msg.content.contains('[LINK]') ? msg.content.substring(0, msg.content.indexOf('[LINK]') - 1) : msg.content}">
                                        </div>
                                        <!-- 구분선 + 버튼 -->
                                        <div th:if="${msg.content.contains('[LINK]')}" style="border-top:1px solid rgba(203,132,88,0.2);">
                                            <a th:href="${msg.content.substring(msg.content.indexOf('[LINK]') + 6)} + '?from=chat&roomId=' + ${room.id}" style="display:block; padding:10px 16px; text-align:center;
                                                      font-size:13px; font-weight:bold; color:#b26f49;
                                                      text-decoration:none;">
                                                공지글 보러가기 &gt;
                                            </a>
                                        </div>
                                    </div>
                                    <span class="msg-time" th:text="${#temporals.format(msg.sentAt, 'HH:mm')}"></span>
                                </div>
                            </div>
                        
                            <!-- 일반 메시지 -->
                            <div th:if="${msg.sender != 'SYSTEM'}" th:classappend="${msg.sender == member.studentId ? 'mine' : ''}"
                                class="msg-row" th:attr="data-msg-id=${msg.id}">
                                <div class="msg-avatar" th:if="${msg.sender != member.studentId}"
                                    th:text="${#strings.substring(msg.senderName, 0, 1)}">김</div>
                                <div class="msg-body">
                                    <span class="msg-sender" th:if="${msg.sender != member.studentId}">
                                        <span th:text="${msg.senderName}"></span>
                                        <span class="year-badge" th:if="${msg.sender != null}"
                                            th:text="${msg.sender.substring(2, 4) + '학번'}"></span>
                                    </span>
                                    <div class="msg-bubble">
                                        <span th:if="${msg.content != null and !msg.content.isEmpty()}" th:text="${msg.content}"></span>
                                        <img th:if="${msg.mediaType == 'image'}" th:src="${msg.mediaUrl}" class="msg-image" th:alt="${msg.fileName}">
                                        <a th:if="${msg.mediaType == 'file'}" th:href="${msg.mediaUrl}" th:text="${'📄 ' + msg.fileName}" class="msg-file-link" target="_blank" download></a>
                                    </div>
                                    <span class="msg-time" th:text="${#temporals.format(msg.sentAt, 'HH:mm')}">00:00</span>
                                </div>
                                <span th:if="${room.type.name() == 'PRIVATE' and msg.sender == member.studentId}"
                                    th:classappend="${otherLastRead != null and msg.id <= otherLastRead ? ' read' : ' unread'}"
                                    class="read-badge" th:text="${otherLastRead != null and msg.id <= otherLastRead ? '읽음' : '1'}"></span>
                            </div>
                        </th:block>
                    </div>

                    <div class="chat-input-area">
                        <form class="chat-input-form" id="chatForm" onsubmit="return false;">
                            <input type="file" id="fileInput" style="display:none;" accept="*/*">
                            <button type="button" class="chat-attach-btn" id="attachBtn" title="파일 첨부">📎</button>
                            <input type="text" id="msgInput" class="chat-input"
                                   placeholder="메시지를 입력하세요..." autocomplete="off" maxlength="500" />
                            <button type="submit" class="chat-send-btn">전송</button>
                        </form>
                    </div>
                </div>
            </section>
        </div>
    </div>
</div>

<!-- 숨김: 서버에서 전달한 값 -->
<span id="roomId" th:text="${room.id}" style="display:none;"></span>
<span id="myId" th:text="${member.studentId}" style="display:none;"></span>
<span id="myName" th:text="${member.name}" style="display:none;"></span>
<span id="isPrivate" th:text="${room.type.name() == 'PRIVATE'}" style="display:none;"></span>

<script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/stompjs@2.3.3/lib/stomp.min.js"></script>
<script>
    const roomId    = document.getElementById('roomId').textContent.trim();
    const myId      = document.getElementById('myId').textContent.trim();
    const myName    = document.getElementById('myName').textContent.trim();
    const isPrivate = document.getElementById('isPrivate').textContent.trim() === 'true';

    function toggleChatMenu(event) {
        event.stopPropagation();
        const menu = document.getElementById('chatMenuDropdown');
        menu.style.display = menu.style.display === 'block' ? 'none' : 'block';
    }
    document.addEventListener('click', () => {
        const menu = document.getElementById('chatMenuDropdown');
        if (menu) menu.style.display = 'none';
    });

    function todayStr() {
        const d = new Date();
        return `${d.getFullYear()}년 ${d.getMonth()+1}월 ${d.getDate()}일`;
    }

    let lastShownDate = (() => {
        const seps = document.querySelectorAll('.chat-date-sep span');
        return seps.length > 0 ? seps[seps.length - 1].textContent.trim() : null;
    })();

    const socket  = new SockJS('/ws');
    const stompClient = Stomp.over(socket);
    stompClient.debug = null;

    stompClient.connect({}, function () {
        stompClient.subscribe('/topic/chat/' + roomId, function (frame) {
            const msg = JSON.parse(frame.body);
            appendMessage(msg);
            if (isPrivate) {
                stompClient.send('/app/chat/' + roomId + '/read', {}, '{}');
            }
        });

        if (isPrivate) {
            stompClient.subscribe('/topic/chat/' + roomId + '/read', function (frame) {
                const noti = JSON.parse(frame.body);
                if (noti.studentId !== myId) {
                    updateReadStatus(noti.lastReadMessageId);
                }
            });
            stompClient.send('/app/chat/' + roomId + '/read', {}, '{}');
        }
    });

    function appendMessage(msg) {
        const container = document.getElementById('chatMessages');

        // 빈 상태 메시지 제거
        const empty = container.querySelector('.chat-empty');
        if (empty) empty.remove();

        const today = todayStr();
        if (lastShownDate !== today) {
            const sep = document.createElement('div');
            sep.className = 'chat-date-sep';
            sep.innerHTML = `<span>${today}</span>`;
            container.appendChild(sep);
            lastShownDate = today;
        }

        // 시스템 메시지 처리
        if (msg.sender === 'SYSTEM') {
            const roomIdVal = document.getElementById('roomId').textContent.trim();
            const content = msg.content || '';
            const linkIdx = content.indexOf('[LINK]');
            const text = linkIdx > -1 ? content.substring(0, linkIdx - 1) : content;
            const link = linkIdx > -1 ? content.substring(linkIdx + 6) + '?from=chat&roomId=' + roomIdVal : null;

            const row = document.createElement('div');
            row.style.cssText = 'display:flex; gap:10px; align-items:flex-start; margin:4px 0;';
            row.innerHTML = `
        <div class="msg-avatar" style="background:rgba(203,132,88,0.15); color:#cb8458; font-size:13px; font-weight:800; flex-shrink:0;">공</div>
        <div style="max-width:280px;">
            <span class="msg-sender" style="display:block; margin-bottom:4px;">공지</span>
            <div style="background:rgba(255,250,243,0.9); border:1px solid rgba(203,132,88,0.25);
                        border-radius:18px; border-bottom-left-radius:4px;
                        overflow:hidden; box-shadow:0 2px 8px rgba(93,70,51,0.08);">
                <div style="padding:12px 16px; font-size:13px; color:#5d4633; line-height:1.6;">${escHtml(text).replace(/\n/g, '<br>')}</div>
                ${link ? `
                <div style="border-top:1px solid rgba(203,132,88,0.2);">
                    <a href="${link}" style="display:block; padding:10px 16px; text-align:center;
                               font-size:13px; font-weight:bold; color:#b26f49; text-decoration:none;">
                        공지글 보러가기
                    </a>
                </div>` : ''}
            </div>
            <span class="msg-time">${escHtml(msg.sentAt || '')}</span>
        </div>
    `;
            container.appendChild(row);
            container.scrollTop = container.scrollHeight;
            return;
        }

        // sentAt이 없으면 현재 시각으로 채움
        if (!msg.sentAt) {
            const now = new Date();
            msg.sentAt = now.getHours().toString().padStart(2, '0') + ':' + now.getMinutes().toString().padStart(2, '0');
        } else if (msg.sentAt.length > 5) {
            // "2026-05-20T02:03:00" → "02:03"
            const d = new Date(msg.sentAt);
            msg.sentAt = d.getHours().toString().padStart(2, '0') + ':' + d.getMinutes().toString().padStart(2, '0');
        }

        if (!msg.sentAt) {
            const now = new Date();
            msg.sentAt = now.getHours().toString().padStart(2, '0') + ':' + now.getMinutes().toString().padStart(2, '0');
        } else if (msg.sentAt.includes('T')) {
            const d = new Date(msg.sentAt);
            msg.sentAt = d.getHours().toString().padStart(2, '0') + ':' + d.getMinutes().toString().padStart(2, '0');
        }
        const isMine = msg.sender === myId;
        const row = document.createElement('div');
        row.className = 'msg-row' + (isMine ? ' mine' : '');
        if (msg.id) row.dataset.msgId = msg.id;

        const yearCode = (msg.sender && msg.sender.length >= 4) ? msg.sender.substring(2, 4) : '';
        const avatarHtml = isMine ? '' :
            `<div class="msg-avatar">${escHtml((msg.senderName || '?').charAt(0))}</div>`;
        const senderLabel = isMine ? '' :
            `<span class="msg-sender">${escHtml(msg.senderName)}<span class="year-badge">${escHtml(yearCode)}학번</span></span>`;
        const readBadge = (isMine && isPrivate) ?
            `<span class="read-badge unread">1</span>` : '';

        let mediaHtml = '';
        if (msg.mediaType === 'image') {
            mediaHtml = `<img src="${safeUrl(msg.mediaUrl)}" class="msg-image" alt="${escHtml(msg.fileName || '')}" onclick="window.open('${safeUrl(msg.mediaUrl)}')">`;
        } else if (msg.mediaType === 'file') {
            mediaHtml = `<a href="${safeUrl(msg.mediaUrl)}" class="msg-file-link" target="_blank" download>📄 ${escHtml(msg.fileName || '파일')}</a>`;
        }

        row.innerHTML = `
            ${avatarHtml}
            <div class="msg-body">
                ${senderLabel}
                <div class="msg-bubble">
                    ${msg.content ? `<span>${escHtml(msg.content)}</span>` : ''}
                    ${mediaHtml}
                </div>
                <span class="msg-time">${escHtml(msg.sentAt || '')}</span>
            </div>
            ${readBadge}
        `;

        container.appendChild(row);
        container.scrollTop = container.scrollHeight;
    }

    function updateReadStatus(lastReadMessageId) {
        if (!lastReadMessageId) return;
        document.querySelectorAll('.msg-row.mine').forEach(row => {
            const msgId = parseInt(row.dataset.msgId);
            if (!msgId) return;
            const badge = row.querySelector('.read-badge');
            if (badge && msgId <= lastReadMessageId) {
                badge.textContent = '읽음';
                badge.classList.remove('unread');
                badge.classList.add('read');
            }
        });
    }

    function escHtml(str) {
        return String(str)
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;');
    }

    function safeUrl(str) {
        return String(str).replace(/"/g, '&quot;');
    }

    document.getElementById('chatForm').addEventListener('submit', function () {
        const input = document.getElementById('msgInput');
        const content = input.value.trim();
        if (!content) return;
        stompClient.send('/app/chat/' + roomId, {}, JSON.stringify({ content: content }));
        input.value = '';
    });

    document.getElementById('msgInput').addEventListener('keydown', function (e) {
        if (e.key === 'Enter' && !e.shiftKey && !e.isComposing) {
            e.preventDefault();
            document.getElementById('chatForm').dispatchEvent(new Event('submit'));
        }
    });

    document.getElementById('attachBtn').addEventListener('click', function () {
        document.getElementById('fileInput').click();
    });

    document.getElementById('fileInput').addEventListener('change', function () {
        const file = this.files[0];
        if (!file) return;

        const formData = new FormData();
        formData.append('file', file);

        fetch('/chat/' + roomId + '/upload', { method: 'POST', body: formData })
            .then(function (res) { return res.json(); })
            .then(function (data) {
                stompClient.send('/app/chat/' + roomId, {}, JSON.stringify({
                    content: '',
                    mediaUrl: data.url,
                    mediaType: data.type,
                    fileName: data.fileName
                }));
            })
            .catch(function () { alert('파일 업로드에 실패했습니다.'); })
            .finally(function () { document.getElementById('fileInput').value = ''; });
    });

    // 초기 스크롤
    (function () {
        const c = document.getElementById('chatMessages');
        c.scrollTop = c.scrollHeight;
    })();

    function togglePinnedList() {
        const list = document.getElementById('pinnedList');
        const btn = document.getElementById('pinnedToggleBtn');
        const isVisible = list.style.display !== 'none';
        list.style.display = isVisible ? 'none' : 'block';
        btn.textContent = isVisible ? '▾' : '▴';
    }
</script>
</body>
</html>
