<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CampusON</title>
    <link rel="stylesheet" href="/css/main.css">
    <link rel="stylesheet" href="/css/subtab-theme.css">
</head>
<body>
<div class="subtab-shell home-shell-page">
    <div class="subtab-wrap">
        <header th:replace="~{fragments/app-layout :: subtabHeader}"></header>

        <div class="subtab-layout home-subtab-layout">
            <aside th:replace="~{fragments/app-layout :: subtabSidebar('home')}"></aside>

            <section class="subtab-content home-subtab-main">
                <section class="subtab-section home-it-headline-section" aria-label="우리 대학교 소식 최신 IT정보">
                    <div class="home-section-head home-it-headline-head">
                        <div>
                            <p class="home-kicker">ARTICLE PICK</p>
                            <h2 class="home-stream-title">최신 IT정보 3줄 요약</h2>
                        </div>
                    </div>

                    <ol class="home-it-summary-list" th:if="${homeItArticles != null && !homeItArticles.isEmpty()}">
                        <li th:each="article, iterStat : ${homeItArticles}"
                            th:if="${iterStat.index < 3}"
                            class="home-it-summary-item">
                            <span class="home-it-summary-number" th:text="${iterStat.index + 1}">1</span>
                            <span class="home-it-summary-title" th:text="${article.title()}">최신 IT정보 제목</span>
                        </li>
                    </ol>

                    <ol class="home-it-summary-list" th:if="${homeItArticles == null || homeItArticles.isEmpty()}">
                        <li class="home-it-summary-item">
                            <span class="home-it-summary-number">1</span>
                            <span class="home-it-summary-title">최신 IT정보를 불러오는 중입니다.</span>
                        </li>
                    </ol>
                </section>

                <section class="subtab-section home-private-chat-section" aria-label="읽지 않은 개인 채팅방 소식">
                    <div class="home-section-head home-private-chat-head">
                        <div>
                            <p class="home-kicker">PRIVATE CHAT</p>
                            <h2 class="home-stream-title">읽지 않은 개인 채팅방 소식</h2>
                        </div>
                        <a href="/chat" class="home-mini-link">채팅으로</a>
                    </div>

                    <div class="home-private-chat-list" th:if="${homePrivateChatSummaries != null && !homePrivateChatSummaries.isEmpty()}">
                        <a th:each="chat : ${homePrivateChatSummaries}"
                           th:href="@{/chat/{id}(id=${chat.roomId()})}"
                           class="home-private-chat-item">
                            <div class="home-private-chat-main">
                                <strong th:text="${chat.otherName()}">홍길동</strong>
                                <span th:text="|${chat.lastSentAtText()} 도착|">방금 전 도착</span>
                            </div>
                            <div class="home-private-chat-count" th:text="|${chat.unreadCount()}개|">2개</div>
                        </a>
                    </div>

                    <div class="home-private-chat-empty" th:if="${homePrivateChatSummaries == null || homePrivateChatSummaries.isEmpty()}">
                        읽지 않은 개인 채팅방 소식이 없습니다.
                    </div>
                </section>

                <section class="subtab-section home-youtube-section" aria-label="대학 컨텐츠 추천">
                    <div class="home-section-head home-youtube-head">
                        <div>
                            <p class="home-kicker">YOUTUBE PICK</p>
                            <h2 class="home-stream-title">대학 컨텐츠 추천</h2>
                        </div>
                    </div>

                    <div class="home-youtube-grid">
                        <a th:each="video : ${homeYoutubeRecommendations}"
                           th:href="${video.url()}"
                           target="_blank"
                           rel="noopener noreferrer"
                           class="home-youtube-card">
                            <div class="home-youtube-thumb">
                                <span class="home-youtube-play">▶</span>
                                <span class="home-youtube-badge" th:text="${video.badge()}">추천</span>
                            </div>
                            <div class="home-youtube-body">
                                <strong th:text="${video.title()}">대학 컨텐츠 추천</strong>
                                <p th:text="${video.description()}">유튜브 추천 설명</p>
                            </div>
                        </a>
                    </div>
                </section>
            </section>
        </div>
    </div>
</div>
<div th:replace="~{fragments/app-layout :: chatNotifications}"></div>
</body>
</html>
