<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CampusON</title>
    <link rel="stylesheet" href="/css/main.css">
    <link rel="stylesheet" href="/css/subtab-theme.css">
</head>
<body>
<div class="subtab-shell home-shell-page">
    <div class="subtab-wrap">
        <header th:replace="~{fragments/app-layout :: subtabHeader}"></header>

        <div class="subtab-layout home-subtab-layout">
            <aside th:replace="~{fragments/app-layout :: subtabSidebar('home')}"></aside>

            <section class="subtab-content home-subtab-main">
                <section class="subtab-section home-it-headline-section" aria-label="우리 대학교 소식 최신 IT정보">
                    <div class="home-section-head home-it-headline-head">
                        <div>
                            <p class="home-kicker">ARTICLE PICK</p>
                            <h2 class="home-stream-title">최신 IT정보 3줄 요약</h2>
                        </div>
                    </div>

                    <ol class="home-it-summary-list" th:if="${homeItArticles != null && !homeItArticles.isEmpty()}">
                        <li th:each="article, iterStat : ${homeItArticles}"
                            th:if="${iterStat.index < 3}"
                            class="home-it-summary-item">
                            <span class="home-it-summary-number" th:text="${iterStat.index + 1}">1</span>
                            <span class="home-it-summary-title" th:text="${article.title()}">최신 IT정보 제목</span>
                        </li>
                    </ol>

                    <ol class="home-it-summary-list" th:if="${homeItArticles == null || homeItArticles.isEmpty()}">
                        <li class="home-it-summary-item">
                            <span class="home-it-summary-number">1</span>
                            <span class="home-it-summary-title">최신 IT정보를 불러오는 중입니다.</span>
                        </li>
                    </ol>
                </section>
            </section>
        </div>
    </div>
</div>
<div th:replace="~{fragments/app-layout :: chatNotifications}"></div>
</body>
</html>
