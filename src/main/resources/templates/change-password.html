<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>비밀번호 변경</title>
  <link rel="stylesheet" href="/css/main.css" />
</head>
<body>
<div class="page-shell">
  <main class="app-frame auth-frame">
    <section class="auth-section">
      <h1 class="auth-title">비밀번호 변경</h1>
      <p class="auth-desc">새로운 비밀번호를 설정하세요.</p>

      <div th:if="${error}" class="error-msg" th:text="${error}"></div>

      <form th:action="@{/change-password}" method="post">
        <div class="form-group">
          <input type="password" name="currentPassword" placeholder="현재 비밀번호" required />
          <input type="password" name="newPassword" placeholder="새 비밀번호" required />
          <input type="password" name="confirmPassword" placeholder="새 비밀번호 확인" required />
        </div>
        <button type="submit" class="btn-primary">변경하기</button>
      </form>

      <div class="auth-link">
        <a th:href="@{/mypage}">← 마이페이지로 돌아가기</a>
      </div>
    </section>
  </main>
</div>
</body>
</html>
