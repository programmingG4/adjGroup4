<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>홈</title>
    <link rel="stylesheet" href="/css/main.css" />
</head>
<body>
<div class="page-shell">
    <main class="app-frame sub-frame">
        <section class="home-section">
            <h1 class="subpage-title">안녕하세요!</h1>
            <p class="subpage-desc">CampusOn에 오신 것을 환영해요.</p>

            <div class="info-card">
                <div class="profile-row">
                    <span class="profile-label">환영합니다</span>
                    <span class="profile-value">CampusOn</span>
                </div>
            </div>

            <form th:action="@{/logout}" method="post">
                <button type="submit" class="logout-btn">로그아웃</button>
            </form>
        </section>

        <nav class="bottom-nav">
            <a href="/" class="nav-item" th:classappend="${activeMenu == 'home'} ? ' active' : ''">메인</a>
            <a href="/chat" class="nav-item" th:classappend="${activeMenu == 'chat'} ? ' active' : ''">채팅</a>
            <a href="/articles" class="nav-item" th:classappend="${activeMenu == 'articles'} ? ' active' : ''">기사</a>
            <a href="/mypage" class="nav-item" th:classappend="${activeMenu == 'mypage'} ? ' active' : ''">MY</a>
        </nav>
    </main>
</div>
</body>
</html>
