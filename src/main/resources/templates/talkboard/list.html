<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CampusOn | 채팅게시판</title>
    <link rel="stylesheet" href="/css/main.css">
    <link rel="stylesheet" href="/css/subtab-theme.css">
    <style>
        @keyframes fadeUpIn {
            from { opacity: 0; transform: translateY(24px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        .board-empty-state { opacity: 0; }
        .board-empty-state.visible {
            animation: fadeUpIn 0.55s cubic-bezier(0.22, 1, 0.36, 1) forwards;
        }

        .board-toolbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            margin-bottom: 12px;
            flex-wrap: wrap;
        }

        .board-category-group {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            align-items: center;
        }

        .board-search-wrap {
            position: relative;
            display: inline-flex;
            align-items: center;
        }

        .board-search-input {
            padding: 7px 32px 7px 14px;
            border: 1.5px solid #eadbc9;
            border-radius: 20px;
            font-size: 13px;
            outline: none;
            background: #fffaf4;
            color: #555;
            width: 150px;
            transition: border-color 0.2s;
        }

        .board-search-input:focus {
            border-color: #cb8458;
        }

        .board-search-icon-btn {
            position: absolute;
            right: 8px;
            background: none;
            border: none;
            cursor: pointer;
            font-size: 14px;
            padding: 0;
            line-height: 1;
            color: #9f8773;
            display: flex;
            align-items: center;
        }
    </style>
</head>

<body>
    <div class="subtab-shell">
        <div class="subtab-wrap">
            <header th:replace="~{fragments/app-layout :: subtabHeader}"></header>

            <div class="subtab-layout">
                <aside th:replace="~{fragments/app-layout :: subtabSidebar('board', 'talkwrite')}"></aside>

                <section class="subtab-content board-theme-list">
                    <section class="subtab-section">
                        <div style="display:flex; align-items:center; gap:14px; margin-bottom:16px;">
                            <a th:href="${backUrl != null ? backUrl : '/chat'}"
                               style="display:inline-flex; align-items:center; justify-content:center;
                                      width:36px; height:36px; border-radius:12px; flex-shrink:0;
                                      background:rgba(242,231,217,0.92); color:#8f6d4c;
                                      font-size:18px; text-decoration:none;">←</a>
                            <div>
                                <p class="board-eyebrow">CHAT BOARD</p>
                                <h1 class="subpage-title">채팅게시판
                                    <span th:if="${chatRoomName != null}"
                                          style="font-size:15px; font-weight:600; color:#9a7e64; margin-left:10px;
                                                 background:rgba(189,123,77,0.1); border-radius:10px;
                                                 padding:3px 12px; vertical-align:middle;"
                                          th:text="${chatRoomName}"></span>
                                </h1>
                            </div>
                            <a th:href="@{/talkboard/write(roomKey=${roomKey}, roomId=${param.roomId}, from=${param.from})}"
                               style="margin-left:auto; padding:8px 16px; border-radius:12px;
                                      background:var(--subtab-accent); color:#fff;
                                      font-size:13px; font-weight:700; text-decoration:none;
                                      white-space:nowrap;">✏️ 글 작성하기</a>
                        </div>

                        <!-- 카테고리 필터 + 검색 -->
                        <div class="board-toolbar" style="margin-bottom:0;">
                            <div class="board-category-group">
                                <a th:each="cat : ${categories}"
                                   th:href="@{/talkboard(category=${cat}, roomKey=${roomKey}, from=${param.from}, roomId=${param.roomId})}"
                                   th:text="${cat}"
                                   th:classappend="${cat == selectedCategory} ? ' active'"
                                   class="board-category-chip">카테고리</a>
                            </div>
                            <form th:action="@{/talkboard/search}" method="get">
                                <input type="hidden" name="roomKey" th:value="${roomKey}">
                                <div class="board-search-wrap">
                                    <input type="text" name="keyword" class="board-search-input"
                                           th:value="${keyword}" placeholder="검색...">
                                    <button type="submit" class="board-search-icon-btn">🔍</button>
                                </div>
                            </form>
                        </div>
                    </section>

                    <section class="subtab-section">
                        <section class="board-list-section">

                            <div th:if="${#lists.isEmpty(posts)}" class="board-empty-state">
                                아직 등록된 게시글이 없습니다.
                            </div>
                            <a th:href="@{/talkboard/{id}(id=${post.id}, category=${selectedCategory})}" th:each="post : ${posts}"
                                class="board-post-card" th:style="${post.pinned} ? 'border-left: 3px solid #cb8458;' : ''">
                                <div class="board-post-main">
                                    <div class="board-post-head">
                                        <span th:if="${post.pinned}" style="color:#cb8458; font-size:12px; margin-right:4px;">📌</span>
                                        <span class="board-post-category"
                                            th:text="${post.hasVote() ? '[투표]' : (post.hasImage() ? '[사진]' : (post.hasVideo() ? '[동영상]' : (post.hasFile() ? '[파일]' : '[공지]')))}"></span>
                                        <strong class="board-post-title" th:text="${post.title}"></strong>
                                    </div>
                                    <p class="board-post-content" th:text="${post.content}"></p>
                                    <div class="board-post-meta">
                                        <th:block th:with="aName=${#strings.contains(post.author, '학번') ? #strings.substringBefore(post.author, ' ') : (#strings.contains(post.author, '_') ? #strings.substringBefore(post.author, '_') : post.author)}, aYear=${#strings.contains(post.author, '학번') ? #strings.substringAfter(post.author, ' ') : (#strings.contains(post.author, '_') ? #strings.substringAfter(post.author, '_') + '학번' : null)}">
                                            <span th:text="${aName}"></span><span th:if="${aYear != null}" class="year-badge" th:text="${aYear}"></span>
                                        </th:block>
                                        <span class="board-meta-divider">•</span>
                                        <span th:text="${#temporals.format(post.regDate, 'yyyy-MM-dd HH:mm')}"></span>
                                    </div>
                                </div>
                                <img th:if="${not #lists.isEmpty(post.imagePaths)}" th:src="${post.imagePaths[0]}"
                                    class="board-post-thumb" alt="썸네일">
                            </a>

                        </section>
                    </section>
                </section>
            </div>
        </div>
    </div>
<script>
    const emptyEl = document.querySelector('.board-empty-state');
    if (emptyEl) {
        const observer = new IntersectionObserver(function(entries) {
            entries.forEach(function(entry) {
                if (entry.isIntersecting) {
                    emptyEl.classList.add('visible');
                    observer.disconnect();
                }
            });
        }, { threshold: 0.2 });
        observer.observe(emptyEl);
    }
</script>
</body>

</html>
