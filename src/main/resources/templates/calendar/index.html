<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>학사 일정 | CampusON</title>
    <link rel="stylesheet" href="/css/subtab-theme.css">
    <link rel="stylesheet" href="/css/calendar-page.css">
</head>
<body>
<div class="subtab-shell calendar-page-shell">
    <div class="subtab-wrap">
        <header th:replace="~{fragments/app-layout :: subtabHeader}"></header>

        <div class="subtab-layout calendar-layout">
            <aside th:replace="~{fragments/app-layout :: subtabSidebar('calendar')}"></aside>

            <main class="subtab-content calendar-content">
                <section class="calendar-card">
                    <div class="calendar-head">
                        <div>
                            <p class="subtab-eyebrow">ACADEMIC CALENDAR</p>
                            <h2 class="calendar-title">학교 일정 달력</h2>
                            <p class="calendar-desc">단국대학교 학사일정과 내 개인 메모를 한 달 단위로 함께 확인합니다.</p>
                        </div>
                        <div class="calendar-nav">
                            <a th:href="@{/calendar(year=${prevMonth.year}, month=${prevMonth.monthValue})}" class="calendar-nav-btn" aria-label="이전 달">‹</a>
                            <strong th:text="${yearMonth.year + '년 ' + yearMonth.monthValue + '월'}">2026년 5월</strong>
                            <a th:href="@{/calendar(year=${nextMonth.year}, month=${nextMonth.monthValue})}" class="calendar-nav-btn" aria-label="다음 달">›</a>
                        </div>
                    </div>

                    <div class="calendar-grid" aria-label="월간 학사 일정 달력">
                        <div class="calendar-weekday is-sunday">일</div>
                        <div class="calendar-weekday">월</div>
                        <div class="calendar-weekday">화</div>
                        <div class="calendar-weekday">수</div>
                        <div class="calendar-weekday">목</div>
                        <div class="calendar-weekday">금</div>
                        <div class="calendar-weekday is-saturday">토</div>

                        <div th:each="week : ${calendarWeeks}" th:remove="tag">
                            <article th:each="day : ${week}"
                                     class="calendar-day"
                                     th:classappend="${day.monthValue != yearMonth.monthValue ? ' is-muted' : ''} + ${day.equals(today) ? ' is-today' : ''}"
                                     th:attr="data-date=${day}">
                                <div class="calendar-day-number" th:text="${day.dayOfMonth}">1</div>

                                <div class="calendar-events">
                                    <a th:each="event : ${schedules}"
                                       th:if="${!event.startDate().isAfter(day) and !event.endDate().isBefore(day)}"
                                       th:href="${event.sourceUrl()}"
                                       target="_blank"
                                       rel="noopener noreferrer"
                                       class="calendar-event academic-event"
                                       th:title="${event.title()}"
                                       th:text="${event.title()}">수강신청</a>

                                    <div th:each="memo : ${memos}"
                                         th:if="${memo.memoDate().equals(day)}"
                                         class="calendar-event memo-event"
                                         th:text="${memo.content()}">개인 메모</div>
                                </div>
                            </article>
                        </div>
                    </div>
                </section>

                <aside class="calendar-side-card">
                    <section class="calendar-memo-panel">
                        <p class="subtab-eyebrow">MY MEMO</p>
                        <h3>개인 메모 추가</h3>
                        <form th:action="@{/calendar/memo}" method="post" class="calendar-memo-form">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                            <input type="hidden" name="year" th:value="${yearMonth.year}">
                            <input type="hidden" name="month" th:value="${yearMonth.monthValue}">
                            <label>
                                날짜
                                <input type="date" name="memoDate" th:value="${selectedDate}" required>
                            </label>
                            <label>
                                메모
                                <textarea name="content" rows="4" maxlength="500" placeholder="예: 과제 마감, 팀 회의, 시험 준비" required></textarea>
                            </label>
                            <button type="submit">메모 저장</button>
                        </form>
                    </section>

                    <section class="calendar-memo-list-panel">
                        <p class="subtab-eyebrow">SAVED MEMO</p>
                        <h3>이번 달 내 메모</h3>
                        <div class="calendar-memo-list" th:if="${memos != null and !memos.isEmpty()}">
                            <article class="calendar-memo-item" th:each="memo : ${memos}" th:if="${memo.memoDate().monthValue == yearMonth.monthValue}">
                                <div>
                                    <strong th:text="${#temporals.format(memo.memoDate(), 'MM.dd')}">05.28</strong>
                                    <p th:text="${memo.content()}">메모 내용</p>
                                </div>
                                <form th:action="@{/calendar/memo/delete}" method="post">
                                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                                    <input type="hidden" name="memoId" th:value="${memo.id()}">
                                    <input type="hidden" name="year" th:value="${yearMonth.year}">
                                    <input type="hidden" name="month" th:value="${yearMonth.monthValue}">
                                    <button type="submit" aria-label="메모 삭제">삭제</button>
                                </form>
                            </article>
                        </div>
                        <div class="calendar-empty" th:if="${memos == null or memos.isEmpty()}">이번 달에 저장한 메모가 없습니다.</div>
                    </section>

                    <a href="https://www.dankook.ac.kr/web/kor/-2014-" target="_blank" rel="noopener noreferrer" class="calendar-source-link">단국대학교 학사일정 원문 보기</a>
                </aside>
            </main>
        </div>
    </div>
</div>
</body>
</html>
